<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Novale - Reserva de Salas</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy-deep:#020d1f; --navy-mid:#0a2448;
  --blue-bright:#1a6fc4; --blue-glow:#2196f3;
  --cyan-accent:#4dd0e1; --cyan-light:#80deea;
  --text-primary:#e8f4fd; --text-secondary:#8db8d8; --text-muted:#4a7a9b;
  --border-subtle:rgba(77,208,225,0.12); --border-active:rgba(77,208,225,0.35);
  --card-bg:rgba(10,36,72,0.6);
}
*{margin:0;padding:0;box-sizing:border-box;}

/* BODY — nunca rola horizontalmente, verticalmente sim */
html, body {
  height:100%;
  overflow-x:hidden;
}
body {
  font-family:'Inter',sans-serif;
  background:var(--navy-deep);
  color:var(--text-primary);
  /* altura total = header fixo + tudo abaixo */
  display:flex;
  flex-direction:column;
}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 20%,rgba(26,111,196,0.15) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 80%,rgba(77,208,225,0.08) 0%,transparent 50%);pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(77,208,225,0.15) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;opacity:0.4;}

/* HEADER */
.header{position:sticky;top:0;z-index:100;background:rgba(2,13,31,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-subtle);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:0.08em;}
.system-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--text-muted);}
.header-actions{display:flex;align-items:center;gap:1rem;}
.btn-admin{display:flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid var(--border-active);background:transparent;color:var(--cyan-accent);font-family:'Inter',sans-serif;font-size:0.8rem;font-weight:500;border-radius:4px;cursor:pointer;transition:all 0.2s;}
.btn-admin:hover{background:rgba(77,208,225,0.1);}
.admin-badge{display:none;align-items:center;gap:6px;padding:4px 10px;background:rgba(38,166,154,0.15);border:1px solid rgba(38,166,154,0.4);border-radius:20px;font-size:0.72rem;color:#4db6ac;font-weight:500;}
.admin-badge.show{display:flex;}
.admin-dot{width:6px;height:6px;border-radius:50%;background:#4db6ac;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* MAIN — ocupa o resto da altura da tela */
.main-wrapper{
  position:relative;
  z-index:1;
  padding:1.25rem 1.5rem 5rem;
  flex:1;
  /* NÃO tem overflow — a rolagem é só no calendário */
}

/* SALAS */
.salas-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:0.75rem;margin-bottom:1rem;}
.sala-tab{padding:0.75rem 1rem;background:var(--card-bg);border:1px solid var(--border-subtle);border-radius:6px;cursor:pointer;transition:all 0.25s;text-align:center;}
.sala-tab:hover{border-color:rgba(77,208,225,0.3);}
.sala-tab.active{background:rgba(26,111,196,0.2);border-color:var(--cyan-accent);box-shadow:0 0 20px rgba(77,208,225,0.1);}
.sala-tab-icon{font-size:1.3rem;margin-bottom:4px;display:block;}
.sala-tab-name{font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;letter-spacing:0.05em;}
.sala-tab-sub{font-size:0.7rem;color:var(--text-muted);margin-top:1px;}
.sala-tab.active .sala-tab-name{color:var(--cyan-accent);}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;background:var(--card-bg);border:1px solid var(--border-subtle);border-radius:6px;padding:0.55rem 1rem;}
.week-info{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;letter-spacing:0.08em;color:var(--cyan-accent);}
.week-sub{font-size:0.7rem;color:var(--text-muted);display:block;}
.btn-nav{width:32px;height:32px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);border-radius:4px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.btn-nav:hover{border-color:var(--cyan-accent);color:var(--cyan-accent);}

/* INFO BAR */
.info-bar{display:flex;align-items:center;gap:1.5rem;padding:0.5rem 1rem;background:rgba(26,111,196,0.07);border:1px solid rgba(26,111,196,0.15);border-radius:6px;margin-bottom:0.75rem;font-size:0.78rem;color:var(--text-secondary);flex-wrap:wrap;}
.info-bar-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:10px;height:10px;border-radius:2px;background:linear-gradient(135deg,rgba(26,111,196,0.7),rgba(13,48,96,0.9));border:1px solid rgba(77,208,225,0.4);flex-shrink:0;}

/* =====================================================
   CALENDÁRIO
   .cal-wrap      = container total (borda, fundo)
   .cal-head      = linha dos dias — NÃO rola NUNCA
   .cal-scroll    = ÚNICA área com overflow/scroll
   .cal-body      = grid interno das horas
   ===================================================== */
.cal-wrap{
  border:1px solid var(--border-subtle);
  border-radius:8px;
  overflow:hidden;          /* corta tudo que vazar */
  background:var(--card-bg);
  display:flex;
  flex-direction:column;
}

/* Cabeçalho: dias da semana — completamente fixo */
.cal-head{
  display:grid;
  grid-template-columns:72px repeat(7,1fr);
  background:rgba(4,18,44,0.98);
  border-bottom:2px solid var(--border-active);
  flex-shrink:0;
  /* overflow:hidden para não deixar scroll aparecer aqui */
  overflow:hidden;
  position:relative;
  z-index:4;
}
.cal-head-time{
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--border-subtle);
  padding:10px 0;
}
.cal-head-day{
  padding:10px 4px;text-align:center;
  border-right:1px solid var(--border-subtle);
}
.cal-head-day:last-child{border-right:none;}
.cal-day-name{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:0.1em;color:var(--text-muted);text-transform:uppercase;}
.cal-day-num{font-family:'Rajdhani',sans-serif;font-size:1.35rem;font-weight:700;color:var(--text-primary);line-height:1.1;}
.cal-head-day.today .cal-day-num,
.cal-head-day.today .cal-day-name{color:var(--cyan-accent);}

/* Área de scroll: APENAS as linhas de hora rolam */
.cal-scroll{
  overflow-y:auto;
  overflow-x:hidden;    /* sem scroll horizontal — colunas se ajustam */
  /* altura = 10 linhas × 46px = 460px */
  height:460px;
  flex-shrink:0;
}
/* Scrollbar fina e estilizada */
.cal-scroll::-webkit-scrollbar{width:5px;}
.cal-scroll::-webkit-scrollbar-track{background:rgba(4,18,44,0.5);}
.cal-scroll::-webkit-scrollbar-thumb{background:rgba(77,208,225,0.35);border-radius:3px;}
.cal-scroll::-webkit-scrollbar-thumb:hover{background:rgba(77,208,225,0.6);}

/* Grid do corpo */
.cal-body{
  display:grid;
  grid-template-columns:72px repeat(7,1fr);
  width:100%;
}

/* Células de hora */
.cal-td-time{
  border-right:1px solid var(--border-subtle);
  border-bottom:1px solid rgba(77,208,225,0.06);
  height:46px;padding:0 8px;
  display:flex;align-items:center;justify-content:flex-end;
  background:rgba(4,18,44,0.35);
}
.cal-time-text{font-size:0.68rem;color:var(--text-muted);font-weight:500;letter-spacing:0.04em;}

/* Células dos dias */
.cal-td-cell{
  border-right:1px solid var(--border-subtle);
  border-bottom:1px solid rgba(77,208,225,0.06);
  height:46px;position:relative;cursor:pointer;transition:background 0.12s;
}
.cal-td-cell:last-child{border-right:none;}
.cal-td-cell:hover{background:rgba(77,208,225,0.05);}
.cal-td-cell.ocupado{cursor:default;}

/* BLOCOS DE RESERVA */
.reserva-block{
  position:absolute;left:2px;right:2px;top:2px;
  background:linear-gradient(160deg,rgba(26,111,196,0.8),rgba(10,36,72,0.95));
  border:1px solid rgba(77,208,225,0.5);border-radius:4px;
  padding:3px 6px;z-index:2;overflow:hidden;cursor:pointer;
  transition:all 0.18s;box-shadow:inset 0 1px 0 rgba(77,208,225,0.15);
}
.reserva-block:hover{border-color:var(--cyan-accent);box-shadow:0 0 14px rgba(77,208,225,0.25),inset 0 1px 0 rgba(77,208,225,0.2);z-index:3;}
.rb-nome{font-family:'Rajdhani',sans-serif;font-size:0.76rem;font-weight:600;color:var(--cyan-light);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rb-hora{font-size:0.61rem;color:var(--text-secondary);line-height:1.1;margin-top:1px;}

/* MODAIS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,13,31,0.87);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--navy-mid);border:1px solid var(--border-active);border-radius:10px;padding:2rem;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 0 60px rgba(77,208,225,0.15);animation:mIn 0.2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(-10px) scale(0.98)}to{opacity:1;transform:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border-subtle);}
.modal-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:0.08em;color:var(--cyan-accent);}
.modal-close{width:28px;height:28px;border:1px solid var(--border-subtle);background:transparent;color:var(--text-secondary);border-radius:4px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.modal-close:hover{border-color:#ef5350;color:#ef5350;}
.form-group{margin-bottom:1.1rem;}
.form-label{display:block;font-size:0.75rem;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.form-input,.form-select,.form-textarea{width:100%;background:rgba(6,23,48,0.6);border:1px solid var(--border-subtle);color:var(--text-primary);font-family:'Inter',sans-serif;font-size:0.875rem;padding:9px 12px;border-radius:5px;outline:none;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--cyan-accent);box-shadow:0 0 0 2px rgba(77,208,225,0.1);}
.form-select{cursor:pointer;} .form-select option{background:var(--navy-mid);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;}
.form-textarea{height:70px;resize:vertical;}
.btn{padding:9px 20px;border-radius:5px;font-family:'Inter',sans-serif;font-size:0.85rem;font-weight:500;cursor:pointer;border:none;transition:all 0.2s;}
.btn-primary{background:linear-gradient(135deg,var(--blue-bright),var(--blue-glow));color:white;border:1px solid rgba(77,208,225,0.3);}
.btn-primary:hover{box-shadow:0 4px 20px rgba(33,150,243,0.35);transform:translateY(-1px);}
.btn-danger{background:rgba(239,83,80,0.15);color:#ef9a9a;border:1px solid rgba(239,83,80,0.3);}
.btn-danger:hover{background:rgba(239,83,80,0.25);}
.btn-outline{background:transparent;color:var(--text-secondary);border:1px solid var(--border-subtle);}
.btn-outline:hover{border-color:var(--text-secondary);color:var(--text-primary);}
.btn-success{background:rgba(38,166,154,0.2);color:#80cbc4;border:1px solid rgba(38,166,154,0.35);}
.btn-success:hover{background:rgba(38,166,154,0.3);}
.modal-footer{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border-subtle);}
.detail-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-subtle);font-size:0.875rem;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:var(--text-muted);min-width:90px;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;font-weight:500;flex-shrink:0;padding-top:1px;}
.detail-value{color:var(--text-primary);}
.toast-container{position:fixed;top:80px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;}
.toast{padding:10px 16px;border-radius:6px;font-size:0.82rem;font-weight:500;display:flex;align-items:center;gap:8px;animation:tIn 0.2s ease;max-width:320px;border:1px solid;}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast-success{background:rgba(38,166,154,0.15);border-color:rgba(38,166,154,0.4);color:#80cbc4;}
.toast-error{background:rgba(239,83,80,0.15);border-color:rgba(239,83,80,0.4);color:#ef9a9a;}
.toast-info{background:rgba(26,111,196,0.15);border-color:rgba(26,111,196,0.4);color:var(--cyan-light);}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(2,13,31,0.6);z-index:400;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.loading-overlay.show{display:flex;}
.spinner{width:36px;height:36px;border:3px solid var(--border-subtle);border-top-color:var(--cyan-accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.fab{position:fixed;bottom:2rem;right:2rem;z-index:100;display:flex;align-items:center;gap:8px;padding:12px 22px;background:linear-gradient(135deg,var(--blue-bright),#1565c0);border:1px solid rgba(77,208,225,0.4);border-radius:30px;color:white;font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:600;letter-spacing:0.08em;cursor:pointer;box-shadow:0 4px 24px rgba(26,111,196,0.4);transition:all 0.2s;}
.fab:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(26,111,196,0.5);}
.login-logo{text-align:center;margin-bottom:1.5rem;}
.login-logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2rem;letter-spacing:0.12em;color:var(--cyan-accent);}
.login-subtitle{font-size:0.75rem;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;}
@media(max-width:768px){
  .salas-nav{grid-template-columns:repeat(2,1fr);}
  .header{padding:0 1rem;}
  .main-wrapper{padding:1rem 1rem 5rem;}
  .system-title{display:none;}
}
</style>
</head>
<body>

<header class="header">
  <span class="logo-text">NOVALE</span>
  <span class="system-title">Sistema de Reserva de Salas</span>
  <div class="header-actions">
    <div class="admin-badge" id="adminBadge"><div class="admin-dot"></div>ADMINISTRADOR</div>
    <button class="btn-admin" id="btnAdminToggle" onclick="toggleAdminLogin()">🔐 Admin</button>
  </div>
</header>

<main class="main-wrapper">
  <div class="salas-nav" id="salasNav"></div>

  <div class="info-bar">
    <div class="info-bar-item"><div class="legend-dot"></div><span>Slot reservado</span></div>
    <div class="info-bar-item"><span>🖱️ Clique num horario livre para reservar</span></div>
    <div class="info-bar-item" id="adminTip" style="display:none"><span>⚙️ Modo admin ativo</span></div>
  </div>

  <div class="week-nav">
    <button class="btn-nav" onclick="changeWeek(-1)">&#8249;</button>
    <div style="text-align:center">
      <div class="week-info" id="weekLabel">...</div>
      <span class="week-sub" id="weekSub">Navegue entre as semanas</span>
    </div>
    <button class="btn-nav" onclick="changeWeek(1)">&#8250;</button>
  </div>

  <!-- CALENDÁRIO -->
  <div class="cal-wrap">
    <!-- Cabeçalho fixo — zero scroll -->
    <div class="cal-head" id="calHead"></div>
    <!-- Corpo com scroll vertical PROPRIO -->
    <div class="cal-scroll" id="calScroll">
      <div class="cal-body" id="calBody"></div>
    </div>
  </div>
</main>

<button class="fab" onclick="abrirModalNova()">+ Nova Reserva</button>
<div class="toast-container" id="toastContainer"></div>
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<!-- MODAL RESERVA -->
<div class="modal-overlay" id="modalReserva">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalReservaTitle">Nova Reserva</h2>
      <button class="modal-close" onclick="fecharModal('modalReserva')">&#10005;</button>
    </div>
    <div class="form-group">
      <label class="form-label">Sala</label>
      <select class="form-select" id="resFormSala"></select>
    </div>
    <div class="form-group">
      <label class="form-label">Data</label>
      <input type="date" class="form-input" id="resFormData">
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Inicio</label><input type="time" class="form-input" id="resFormInicio"></div>
      <div class="form-group"><label class="form-label">Fim</label><input type="time" class="form-input" id="resFormFim"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Responsavel</label>
      <input type="text" class="form-input" id="resFormResponsavel" placeholder="Nome do responsavel">
    </div>
    <div class="form-group">
      <label class="form-label">Descricao / Pauta</label>
      <textarea class="form-textarea" id="resFormDescricao" placeholder="Assunto da reuniao (opcional)"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharModal('modalReserva')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarReserva()" id="btnSalvarReserva">Confirmar Reserva</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modalDetalhe">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title">Detalhe da Reserva</h2>
      <button class="modal-close" onclick="fecharModal('modalDetalhe')">&#10005;</button>
    </div>
    <div id="detalheContent"></div>
    <div class="modal-footer" id="detalheFooter"></div>
  </div>
</div>

<!-- MODAL LOGIN -->
<div class="modal-overlay" id="modalLogin">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <h2 class="modal-title">Acesso Restrito</h2>
      <button class="modal-close" onclick="fecharModal('modalLogin')">&#10005;</button>
    </div>
    <div class="login-logo">
      <div class="login-logo-text">NOVALE</div>
      <div class="login-subtitle">Painel Administrativo</div>
    </div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input type="text" class="form-input" id="loginUser" placeholder="Usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" id="loginPass" placeholder="Senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <div id="loginError" style="font-size:0.8rem;color:#ef9a9a;min-height:20px;margin-top:4px;"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="fecharModal('modalLogin')">Cancelar</button>
      <button class="btn btn-primary" onclick="fazerLogin()">Entrar</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// URL DO APPS SCRIPT — usada quando o HTML esta fora do GAS
// ============================================================
var API_URL = 'https://script.google.com/macros/s/AKfycbxK_QM2LkSsGKYbQ_EAC5eL8N4G0TFa40YlaKQQ2bcTH_hUpEsGC07oixn2J3YFz4Tu/exec';

// Detecta se esta rodando DENTRO do Apps Script
var DENTRO_GAS = (typeof google !== 'undefined' && google.script && google.script.run);

// ============================================================
// CONSTANTES
// ============================================================
var SALAS = [
  { nome:'Sala Executiva', sub:'Hall',   icon:'🏛️', full:'Sala Executiva (Hall)' },
  { nome:'Sala Diretoria', sub:'Piso 1', icon:'👔', full:'Sala Diretoria (Piso 1)' },
  { nome:'Sala NOC',       sub:'Piso -2',icon:'🖥️', full:'Sala NOC (Piso -2)' },
  { nome:'Sala Meeting',   sub:'Piso 2', icon:'🤝', full:'Sala Meeting (Piso 2)' }
];
var DIAS  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
var MESES = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
var HORA_INI = 7, HORA_FIM = 19;

// ============================================================
// ESTADO
// ============================================================
var state = { salaAtiva:0, weekOffset:0, reservas:[], adminToken:null, editandoId:null };

// ============================================================
// COMUNICACAO COM BACKEND
// Usa google.script.run se estiver no GAS, senao usa fetch POST
// ============================================================
function chamar(fn, args, callback, errback) {
  if (DENTRO_GAS) {
    var runner = google.script.run
      .withSuccessHandler(callback)
      .withFailureHandler(errback || function(e){ showToast('Erro: ' + e.message, 'error'); showLoading(false); });
    runner[fn].apply(runner, args || []);
  } else {
    // Fora do GAS: usa fetch POST para o Apps Script
    var payload = { acao: fn };
    if (fn === 'criarReserva')     payload.reserva  = args[0];
    if (fn === 'atualizarReserva') { payload.id = args[0]; payload.reserva = args[1]; }
    if (fn === 'excluirReserva')   payload.id       = args[0];
    if (fn === 'loginAdmin')       { payload.username = args[0]; payload.password = args[1]; }
    if (fn === 'logoutAdmin')      payload.token     = args[0];

    fetch(API_URL, {
      method: 'POST',
      redirect: 'follow',
      body: JSON.stringify(payload)
    })
    .then(function(r){ return r.json(); })
    .then(callback)
    .catch(function(e){
      if (errback) errback(e);
      else { showToast('Falha ao conectar com o servidor.', 'error'); showLoading(false); }
    });
  }
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  limparCache();
  renderSalasTabs();
  renderCalendar();
  carregarReservas();

  var token = sessionStorage.getItem('novale_admin');
  if (token) { state.adminToken = token; updateAdminUI(true); }
});

// ============================================================
// ANTI-CACHE
// ============================================================
function limparCache() {
  var VERSAO = 'novale-v6';
  if (localStorage.getItem('app_v') !== VERSAO) {
    localStorage.clear(); sessionStorage.clear();
    localStorage.setItem('app_v', VERSAO);
  }
  if ('caches' in window) caches.keys().then(function(ns){ ns.forEach(function(n){ caches.delete(n); }); });
}

// ============================================================
// SALAS TABS
// ============================================================
function renderSalasTabs() {
  var nav = document.getElementById('salasNav');
  var sel = document.getElementById('resFormSala');
  nav.innerHTML = ''; sel.innerHTML = '';
  SALAS.forEach(function(s, i) {
    var tab = document.createElement('div');
    tab.className = 'sala-tab' + (i === state.salaAtiva ? ' active' : '');
    tab.innerHTML = '<span class="sala-tab-icon">' + s.icon + '</span><div class="sala-tab-name">' + s.nome + '</div><div class="sala-tab-sub">' + s.sub + '</div>';
    tab.onclick = function(){ state.salaAtiva = i; renderSalasTabs(); renderCalendar(); };
    nav.appendChild(tab);
    var opt = document.createElement('option');
    opt.value = s.full; opt.textContent = s.full;
    if (i === state.salaAtiva) opt.selected = true;
    sel.appendChild(opt);
  });
}

// ============================================================
// CALENDÁRIO
// ============================================================
function getWeekDates() {
  var today = new Date();
  var start = new Date(today);
  start.setDate(today.getDate() - today.getDay() + (state.weekOffset * 7));
  start.setHours(0,0,0,0);
  var dates = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(start); d.setDate(start.getDate() + i); dates.push(d);
  }
  return dates;
}

function fmtKey(d)  { return d.toISOString().split('T')[0]; }
function fmtDisp(s) { if(!s) return ''; var p=s.split('-'); return p[2]+'/'+p[1]+'/'+p[0]; }

function renderCalendar() {
  var dates = getWeekDates();
  var today = new Date(); today.setHours(0,0,0,0);
  var salaFull = SALAS[state.salaAtiva].full;

  // Label da semana
  var f = dates[0], l = dates[6];
  document.getElementById('weekLabel').textContent =
    f.getDate() + ' ' + MESES[f.getMonth()] + ' - ' + l.getDate() + ' ' + MESES[l.getMonth()] + ' ' + l.getFullYear();
  document.getElementById('weekSub').textContent =
    state.weekOffset === 0 ? 'Semana atual' : (state.weekOffset > 0 ? '+' + state.weekOffset + ' semana(s)' : state.weekOffset + ' semana(s)');

  // ── CABEÇALHO (fixo, nunca rola) ──────────────────────────
  var head = document.getElementById('calHead');
  head.innerHTML = '';

  var thT = document.createElement('div');
  thT.className = 'cal-head-time';
  thT.innerHTML = '<span style="font-size:0.72rem;color:var(--text-muted)">&#9201;</span>';
  head.appendChild(thT);

  dates.forEach(function(d) {
    var isToday = (d.getTime() === today.getTime());
    var th = document.createElement('div');
    th.className = 'cal-head-day' + (isToday ? ' today' : '');
    th.innerHTML = '<div class="cal-day-name">' + DIAS[d.getDay()] + '</div><div class="cal-day-num">' + d.getDate() + '</div>';
    head.appendChild(th);
  });

  // ── CORPO (scroll so aqui) ────────────────────────────────
  var body = document.getElementById('calBody');
  body.innerHTML = '';

  var salaRes = state.reservas.filter(function(r){ return r.sala === salaFull; });

  for (var h = HORA_INI; h < HORA_FIM; h++) {
    var tdT = document.createElement('div');
    tdT.className = 'cal-td-time';
    tdT.innerHTML = '<span class="cal-time-text">' + (h < 10 ? '0' + h : h) + ':00</span>';
    body.appendChild(tdT);

    dates.forEach(function(d) {
      var dateKey = fmtKey(d);
      var hLocal  = h; // captura correta no closure
      var cell = document.createElement('div');
      cell.className = 'cal-td-cell';

      var nesta = salaRes.filter(function(r) {
        if (r.data !== dateKey) return false;
        var ini = parseInt(r.horaInicio.substring(0,2));
        var fim = parseInt(r.horaFim.substring(0,2));
        return hLocal >= ini && hLocal < fim;
      });

      if (nesta.length > 0) {
        cell.classList.add('ocupado');
        nesta.forEach(function(r) {
          var ini = parseInt(r.horaInicio.substring(0,2));
          if (hLocal === ini) {
            var fim = parseInt(r.horaFim.substring(0,2));
            var dur = Math.max(fim - ini, 1);
            var block = document.createElement('div');
            block.className = 'reserva-block';
            block.style.height = (dur * 46 - 4) + 'px';
            block.innerHTML = '<div class="rb-nome">' + esc(r.responsavel) + '</div><div class="rb-hora">' + r.horaInicio + ' - ' + r.horaFim + '</div>';
            block.onclick = (function(rr){ return function(ev){ ev.stopPropagation(); abrirDetalhe(rr); }; })(r);
            cell.appendChild(block);
          }
        });
      } else {
        cell.onclick = (function(dk, hh){ return function(){ abrirModalNova(dk, (hh<10?'0'+hh:hh)+':00'); }; })(dateKey, hLocal);
      }

      body.appendChild(cell);
    });
  }
}

// ============================================================
// CARREGAR RESERVAS
// ============================================================
function carregarReservas() {
  showLoading(true);
  chamar('getReservas', [], function(res) {
    showLoading(false);
    if (res.success) {
      state.reservas = res.data || [];
      renderCalendar();
    } else {
      showToast('Erro ao carregar: ' + (res.error || ''), 'error');
    }
  }, function(e) {
    showLoading(false);
    showToast('Falha ao conectar com o servidor.', 'error');
  });
}

// ============================================================
// MODAL NOVA / EDITAR
// ============================================================
function abrirModalNova(data, hora) {
  state.editandoId = null;
  document.getElementById('modalReservaTitle').textContent = 'Nova Reserva';
  document.getElementById('btnSalvarReserva').textContent  = 'Confirmar Reserva';
  var sel = document.getElementById('resFormSala');
  for (var i = 0; i < sel.options.length; i++) sel.options[i].selected = sel.options[i].value === SALAS[state.salaAtiva].full;
  document.getElementById('resFormData').value = data || fmtKey(new Date());
  if (hora) {
    document.getElementById('resFormInicio').value = hora;
    var hh = parseInt(hora.split(':')[0]);
    document.getElementById('resFormFim').value = (Math.min(hh+1,23) < 10 ? '0' : '') + Math.min(hh+1,23) + ':00';
  } else {
    document.getElementById('resFormInicio').value = '';
    document.getElementById('resFormFim').value = '';
  }
  document.getElementById('resFormResponsavel').value = '';
  document.getElementById('resFormDescricao').value   = '';
  abrirModal('modalReserva');
}

function abrirModalEditar(r) {
  state.editandoId = r.id;
  document.getElementById('modalReservaTitle').textContent = 'Editar Reserva';
  document.getElementById('btnSalvarReserva').textContent  = 'Salvar Alteracoes';
  var sel = document.getElementById('resFormSala');
  for (var i = 0; i < sel.options.length; i++) sel.options[i].selected = sel.options[i].value === r.sala;
  document.getElementById('resFormData').value        = r.data;
  document.getElementById('resFormInicio').value      = r.horaInicio;
  document.getElementById('resFormFim').value         = r.horaFim;
  document.getElementById('resFormResponsavel').value = r.responsavel;
  document.getElementById('resFormDescricao').value   = r.descricao || '';
  fecharModal('modalDetalhe');
  abrirModal('modalReserva');
}

function salvarReserva() {
  var sala = document.getElementById('resFormSala').value;
  var data = document.getElementById('resFormData').value;
  var ini  = document.getElementById('resFormInicio').value;
  var fim  = document.getElementById('resFormFim').value;
  var resp = document.getElementById('resFormResponsavel').value.trim();
  var desc = document.getElementById('resFormDescricao').value.trim();

  if (!sala||!data||!ini||!fim||!resp) { showToast('Preencha todos os campos obrigatorios.','error'); return; }
  if (ini >= fim)                       { showToast('Horario de fim deve ser apos o inicio.','error');  return; }

  var conflito = state.reservas.some(function(r) {
    if (r.id === state.editandoId) return false;
    if (r.sala !== sala || r.data !== data) return false;
    return ini < r.horaFim && fim > r.horaInicio;
  });
  if (conflito) { showToast('Horario ja ocupado para esta sala!','error'); return; }

  var reserva = { sala:sala, data:data, horaInicio:ini, horaFim:fim, responsavel:resp, descricao:desc };
  showLoading(true);

  var fn   = state.editandoId ? 'atualizarReserva' : 'criarReserva';
  var args = state.editandoId ? [state.editandoId, reserva] : [reserva];
  var idSalvo = state.editandoId;

  chamar(fn, args, function(res) {
    showLoading(false);
    if (res.success) {
      fecharModal('modalReserva');
      showToast(idSalvo ? 'Reserva atualizada!' : 'Reserva confirmada!', 'success');
      state.editandoId = null;
      carregarReservas();
    } else {
      showToast(res.error || 'Erro ao salvar.', 'error');
    }
  }, function(e) {
    showLoading(false);
    showToast('Falha ao conectar com o servidor.', 'error');
  });
}

// ============================================================
// DETALHE
// ============================================================
function abrirDetalhe(r) {
  document.getElementById('detalheContent').innerHTML =
    '<div class="detail-row"><span class="detail-label">Sala</span><span class="detail-value">'      + esc(r.sala)        + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Data</span><span class="detail-value">'      + fmtDisp(r.data)    + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Horario</span><span class="detail-value">'  + esc(r.horaInicio)  + ' - ' + esc(r.horaFim) + '</span></div>' +
    '<div class="detail-row"><span class="detail-label">Responsavel</span><span class="detail-value">' + esc(r.responsavel) + '</span></div>' +
    (r.descricao ? '<div class="detail-row"><span class="detail-label">Pauta</span><span class="detail-value">' + esc(r.descricao) + '</span></div>' : '');

  var footer = document.getElementById('detalheFooter');
  var rCopy  = JSON.parse(JSON.stringify(r));
  if (state.adminToken) {
    footer.innerHTML =
      '<button class="btn btn-outline" onclick="fecharModal(\'modalDetalhe\')">Fechar</button>' +
      '<button class="btn btn-danger"  onclick="confirmarExclusao(\'' + esc(r.id) + '\')">🗑 Excluir</button>' +
      '<button class="btn btn-success" id="btnEdit">✏️ Editar</button>';
    document.getElementById('btnEdit').onclick = function(){ abrirModalEditar(rCopy); };
  } else {
    footer.innerHTML = '<button class="btn btn-outline" onclick="fecharModal(\'modalDetalhe\')">Fechar</button>';
  }
  abrirModal('modalDetalhe');
}

function confirmarExclusao(id) {
  if (!confirm('Confirma a exclusao desta reserva?')) return;
  showLoading(true);
  chamar('excluirReserva', [id], function(res) {
    showLoading(false);
    if (res.success) {
      fecharModal('modalDetalhe');
      showToast('Reserva excluida.', 'success');
      carregarReservas();
    } else {
      showToast(res.error || 'Erro ao excluir.', 'error');
    }
  }, function(){ showLoading(false); showToast('Falha ao conectar.', 'error'); });
}

// ============================================================
// ADMIN
// ============================================================
function toggleAdminLogin() {
  if (state.adminToken) { fazerLogout(); return; }
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').textContent = '';
  abrirModal('modalLogin');
}

function fazerLogin() {
  var user = document.getElementById('loginUser').value.trim();
  var pass = document.getElementById('loginPass').value;
  var err  = document.getElementById('loginError');
  if (!user||!pass) { err.textContent = 'Preencha usuario e senha.'; return; }
  err.textContent = '';
  showLoading(true);
  chamar('loginAdmin', [user, pass], function(res) {
    showLoading(false);
    if (res.success) {
      state.adminToken = res.token;
      sessionStorage.setItem('novale_admin', res.token);
      fecharModal('modalLogin');
      updateAdminUI(true);
      showToast('Bem-vindo, Administrador!', 'success');
    } else {
      err.textContent = res.error || 'Credenciais invalidas.';
    }
  }, function(){ showLoading(false); document.getElementById('loginError').textContent = 'Erro ao conectar.'; });
}

function fazerLogout() {
  chamar('logoutAdmin', [state.adminToken], function(){}, function(){});
  state.adminToken = null;
  sessionStorage.removeItem('novale_admin');
  updateAdminUI(false);
  showToast('Sessao encerrada.', 'info');
}

function updateAdminUI(isAdmin) {
  document.getElementById('adminBadge').classList.toggle('show', isAdmin);
  document.getElementById('btnAdminToggle').textContent = isAdmin ? '🔓 Sair' : '🔐 Admin';
  document.getElementById('adminTip').style.display = isAdmin ? 'flex' : 'none';
}

// ============================================================
// UTILS
// ============================================================
function changeWeek(dir) { state.weekOffset += dir; renderCalendar(); }
function abrirModal(id)  { document.getElementById(id).classList.add('open'); }
function fecharModal(id) { document.getElementById(id).classList.remove('open'); }
function showLoading(v)  { document.getElementById('loadingOverlay').classList.toggle('show', v); }

function showToast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  var ico = {success:'✓', error:'✕', info:'ℹ'};
  t.innerHTML = '<span>' + (ico[type]||'ℹ') + '</span>' + msg;
  c.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(function(){ t.remove(); }, 300); }, 3500);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.querySelectorAll('.modal-overlay').forEach(function(o) {
  o.addEventListener('click', function(e){ if(e.target===o) o.classList.remove('open'); });
});
</script>
